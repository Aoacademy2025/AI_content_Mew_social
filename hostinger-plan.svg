  <text x="48" y="90" font-size="28" font-weight="800" fill="#ffffff">Hostinger Plan Analysis</text>
  <text x="48" y="116" font-size="13" fill="#4b6480">AI Content Studio  ·  500–1,000 Users</text>
  <rect x="48" y="134" width="804" height="1" fill="#1e2d40"/>

  <!-- WHY NOT SHARED -->
  <text x="48" y="168" font-size="10" font-weight="700" fill="#ef4444" letter-spacing="3">WHY SHARED HOSTING WON'T WORK</text>

  <rect x="48"  y="180" width="186" height="78" rx="10" fill="#1a0f0f" stroke="#ef444430" stroke-width="1"/>
  <text x="68"  y="202" font-size="12" font-weight="700" fill="#ef4444">Remotion + FFmpeg</text>
  <text x="68"  y="220" font-size="10" fill="#94a3b8">Spawn Chromium process</text>
  <text x="68"  y="236" font-size="10" fill="#94a3b8">ต้องการ RAM สูงมาก</text>
  <text x="68"  y="250" font-size="10" fill="#ef4444">ห้ามบน Shared Hosting</text>

  <rect x="246" y="180" width="186" height="78" rx="10" fill="#1a0f0f" stroke="#ef444430" stroke-width="1"/>
  <text x="266" y="202" font-size="12" font-weight="700" fill="#ef4444">Timeout 300s</text>
  <text x="266" y="220" font-size="10" fill="#94a3b8">maxDuration = 300s ใน code</text>
  <text x="266" y="236" font-size="10" fill="#94a3b8">Shared timeout แค่ ~30s</text>
  <text x="266" y="250" font-size="10" fill="#ef4444">Request จะ fail ทันที</text>

  <rect x="444" y="180" width="186" height="78" rx="10" fill="#1a0f0f" stroke="#ef444430" stroke-width="1"/>
  <text x="464" y="202" font-size="12" font-weight="700" fill="#ef4444">Video File Storage</text>
  <text x="464" y="220" font-size="10" fill="#94a3b8">renders/ + stocks/ folders</text>
  <text x="464" y="236" font-size="10" fill="#94a3b8">1 วิดีโอ = 50–200 MB</text>
  <text x="464" y="250" font-size="10" fill="#ef4444">500 users กิน disk TB+</text>

  <rect x="642" y="180" width="186" height="78" rx="10" fill="#1a0f0f" stroke="#ef444430" stroke-width="1"/>
  <text x="662" y="202" font-size="12" font-weight="700" fill="#ef4444">SQLite (current DB)</text>
  <text x="662" y="220" font-size="10" fill="#94a3b8">ไม่รองรับ concurrent</text>
  <text x="662" y="236" font-size="10" fill="#94a3b8">writes จาก 500 users</text>
  <text x="662" y="250" font-size="10" fill="#ef4444">ต้องเปลี่ยน PostgreSQL</text>

