  <text x="282" y="728" font-size="10" fill="#64748b">แทน SQLite ปัจจุบัน</text>
  <text x="282" y="744" font-size="10" fill="#64748b">Prisma migrate</text>

  <text x="459" y="723" font-size="16" fill="#334155">+</text>

  <rect x="476" y="686" width="190" height="68" rx="10" fill="#0f1825" stroke="#1e3a5f" stroke-width="1"/>
