  <text x="496" y="728" font-size="10" fill="#64748b">Video file storage</text>
  <text x="496" y="744" font-size="10" fill="#64748b">CDN delivery</text>

  <text x="673" y="723" font-size="16" fill="#334155">+</text>

  <rect x="690" y="686" width="162" height="68" rx="10" fill="#0f1825" stroke="#1e3a5f" stroke-width="1"/>
