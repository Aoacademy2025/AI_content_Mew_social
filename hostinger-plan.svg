  <text x="68"  y="824" font-size="12" fill="#94a3b8">Hostinger KVM 4</text>
  <text x="68"  y="840" font-size="10" fill="#64748b">VPS รัน Next.js + Redis + PostgreSQL</text>
  <text x="300" y="832" font-size="16" font-weight="800" fill="#22c55e">$20 / เดือน</text>

  <rect x="440" y="808" width="1" height="50" fill="#1e3a5f"/>

