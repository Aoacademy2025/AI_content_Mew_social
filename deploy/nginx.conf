server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;  # แก้ตรงนี้

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;  # แก้ตรงนี้

    # SSL — ใช้ Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Upload size — สำหรับ video upload
    client_max_body_size 500M;

    # Timeout — สำหรับ render/HeyGen ที่ใช้เวลานาน
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files — serve โดยตรงจาก Nginx (เร็วกว่า Next.js)
    location /_next/static/ {
        alias /var/www/ai-content/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /renders/ {
        alias /var/www/ai-content/public/renders/;
        expires 7d;
    }
}
